[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
pharos_atlantic = "https://atlantic.dplabs-internal.com"

# Contract verification on Pharosscan (Etherscan-compatible endpoint).
# NOTE: endpoint/format to confirm — if Etherscan-style verify fails, Pharosscan
# is Blockscout-based; use: forge verify-contract <addr> SentinelRegistry \
#   --verifier blockscout --verifier-url https://atlantic.pharosscan.xyz/api
[etherscan]
pharos_atlantic = { key = "${PHAROSSCAN_API_KEY}", url = "https://atlantic.pharosscan.xyz/api", chain = 688689 }
